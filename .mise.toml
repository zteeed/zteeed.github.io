# Pinned tools - run `mise install` to install
# Ruby 3.3.4 = same as GitHub Pages (Jekyll 3.10, Sass 3.7)
# https://pages.github.com/versions/
[tools]
ruby = "3.3.4"

# Tasks - run with `mise run <task>`
[tasks.install]
description = "Install gem dependencies (bundle install)"
run = "bundle install"

[tasks.update]
description = "Update all gems to latest versions allowed by Gemfile"
run = "bundle update"

[tasks.serve]
description = "Run Jekyll dev server (bundle exec jekyll serve)"
run = "bundle exec jekyll serve"

[tasks.build]
description = "Build Jekyll site (bundle exec jekyll build)"
depends = ["install"]
run = "bundle exec jekyll build"
